<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="body">
<section class="py-8 md:py-12">
    <div class="max-w-6xl mx-auto">
        <header class="bg-white border border-gray-200 rounded-lg p-6 md:p-8 mb-8">
            <a data-th-href="${baseUrl + '/opportunities'}" href="/opportunities" class="text-sm font-medium hover:underline" style="color: #1E40AF;">← Back to Opportunities</a>
            <h1 class="text-2xl md:text-3xl font-bold mt-3 mb-2" style="color: #1E40AF;" th:text="${category.name}">Category</h1>
            <p class="text-sm md:text-base text-gray-600" th:text="${category.description}">Category description</p>
        </header>

        <div class="space-y-4">
            <a th:if="${#lists.isEmpty(jobs)}" href="#" class="block bg-white border border-gray-200 rounded-lg p-6 text-sm text-gray-600">
                No jobs currently listed for this category. Check again soon.
            </a>
            <a th:each="job : ${jobs}"
               data-th-href="${baseUrl + '/jobs/' + job.slug}"
               th:href="@{/jobs/{slug}(slug=${job.slug})}"
               class="block bg-white border border-gray-200 rounded-lg p-5 transition-shadow transition-colors hover:shadow-md hover:border-gray-300">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                    <div>
                        <h2 class="text-lg font-semibold mb-1" style="color: #1E40AF;" th:text="${job.title}">Job title</h2>
                        <p class="text-sm text-gray-700" th:text="${job.company + ' • ' + job.location}">Company • Location</p>
                        <p class="text-sm text-gray-600 mt-2" th:text="${job.shortDescription}">Summary</p>
                    </div>
                    <div class="text-left md:text-right">
                        <span class="inline-block px-3 py-1 rounded-full text-xs font-medium mb-2" style="background-color: #EFF6FF; color: #1E40AF;" th:text="${job.employmentType}">Type</span>
                        <p class="text-xs text-gray-500" th:text="${'Posted ' + job.postedDate}">Posted date</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>
</th:block>
