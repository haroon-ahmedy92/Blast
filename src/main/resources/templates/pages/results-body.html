<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="body">
<section class="py-8 md:py-12">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold mb-3" style="color: #166534;">Examination Results</h1>
            <p class="text-sm md:text-base text-gray-600">
                Browse recent result releases and open detailed guidance pages for each exam type.
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            <a th:each="exam : ${exams}"
               data-th-href="${baseUrl + '/results/' + exam.slug}"
               th:href="@{/results/{examSlug}(examSlug=${exam.slug})}"
               class="block bg-white border border-gray-200 rounded-lg p-5 transition-shadow transition-colors hover:shadow-md hover:border-gray-300">
                <div class="flex items-start gap-3 mb-3">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center shrink-0" style="background-color: #DCFCE7; color: #166534;">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-semibold mb-1" style="color: #166534;" th:text="${exam.title}">Exam title</h2>
                        <p class="text-xs text-gray-500" th:text="${exam.provider + ' • ' + exam.region}">Provider • Region</p>
                    </div>
                </div>
                <p class="text-sm text-gray-600 mb-2" th:text="${exam.summary}">Summary</p>
                <p class="text-xs text-gray-500" th:text="${'Published ' + exam.publishedOn}">Date</p>
            </a>
        </div>
    </div>
</section>
</th:block>
