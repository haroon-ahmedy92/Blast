<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="body">
<section class="py-8 md:py-12">
    <div class="max-w-5xl mx-auto">
        <a data-th-href="${baseUrl + '/results'}" href="/results" class="text-sm font-medium hover:underline" style="color: #166534;">← Back to Results</a>

        <article class="bg-white border border-gray-200 rounded-lg p-6 md:p-8 mt-4 mb-8">
            <h1 class="text-2xl md:text-3xl font-bold mb-2" style="color: #166534;" th:text="${exam.title}">Exam title</h1>
            <p class="text-sm text-gray-600 mb-4" th:text="${exam.provider + ' • ' + exam.region + ' • ' + exam.publishedOn}">Meta</p>
            <p class="text-sm md:text-base text-gray-700 leading-relaxed mb-5" th:text="${exam.summary}">Summary</p>

            <h2 class="text-lg font-semibold mb-3" style="color: #166534;">Highlights</h2>
            <ul class="space-y-2">
                <li th:each="item : ${exam.highlights}" class="text-sm text-gray-700 flex items-start gap-2">
                    <i class="fas fa-check-circle mt-0.5" style="color: #166534;"></i>
                    <span th:text="${item}">Highlight</span>
                </li>
            </ul>
        </article>

        <section>
            <h2 class="text-xl font-semibold mb-4" style="color: #166534;">More Results</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <a th:each="item : ${moreExams}"
                   data-th-href="${baseUrl + '/results/' + item.slug}"
                   th:href="@{/results/{examSlug}(examSlug=${item.slug})}"
                   class="block bg-white border border-gray-200 rounded-lg p-4 transition-shadow transition-colors hover:shadow-md hover:border-gray-300">
                    <h3 class="text-base font-semibold mb-1" style="color: #166534;" th:text="${item.title}">Title</h3>
                    <p class="text-sm text-gray-600" th:text="${item.provider + ' • ' + item.region}">Meta</p>
                </a>
            </div>
        </section>
    </div>
</section>
</th:block>
