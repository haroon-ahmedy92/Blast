<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="content">
<style>
    :root {
        --blast-primary: #1E40AF;
        --blast-primary-deep: #00288E;
        --blast-surface: #F7F9FB;
        --blast-surface-soft: #F2F4F6;
        --blast-surface-card: #FFFFFF;
        --blast-surface-strong: #E6E8EA;
        --blast-outline: rgba(117, 118, 132, 0.2);
        --blast-ink: #191C1E;
        --blast-muted: #5E656D;
        --blast-accent: #FACC15;
        --blast-accent-soft: #FEF3C7;
        --blast-success: #DCFCE7;
        --blast-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
        --blast-radius-xl: 18px;
        --blast-radius-lg: 14px;
        --blast-radius-md: 10px;
        --blast-header-height: 64px;
    }

    * {
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        margin: 0;
        padding-top: calc(var(--blast-header-height) + 10px);
        background: var(--blast-surface);
        color: var(--blast-ink);
        font-family: 'Figtree', Arial, sans-serif;
    }

    img {
        display: block;
        max-width: 100%;
    }

    a {
        color: inherit;
        text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
        font: inherit;
    }

    main {
        min-height: calc(100vh - 320px);
    }

    .blast-wrap {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
    }

    .blast-site-header {
        position: fixed;
        inset: 0 0 auto;
        z-index: 1000;
        padding: 0;
        background: rgba(247, 249, 251, 0.9);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(196, 197, 213, 0.28);
    }

    .blast-header-shell {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: var(--blast-header-height);
        padding: 0 6px;
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
    }

    .blast-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
    }

    .blast-brand-mark {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 2px;
        border-radius: 10px;
        background: transparent;
    }

    .blast-brand-mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .blast-brand-copy {
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .blast-brand-name {
        color: var(--blast-primary-deep);
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: 0.08em;
    }

    .blast-brand-tag {
        display: none;
    }

    .blast-main-nav {
        display: flex;
        align-items: center;
        gap: 2px;
        min-width: 0;
    }

    .blast-nav-link {
        padding: 8px 10px;
        border-radius: 8px;
        color: var(--blast-muted);
        font-size: 0.79rem;
        font-weight: 500;
        transition: background-color 0.2s ease, color 0.2s ease;
    }

    .blast-nav-link:hover,
    .blast-nav-link.is-active {
        background: rgba(30, 64, 175, 0.06);
        color: var(--blast-primary-deep);
    }

    .blast-header-tools {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        min-width: 0;
    }

    .blast-header-search {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        width: 210px;
        padding: 0 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(196, 197, 213, 0.22);
    }

    .blast-header-search i {
        color: var(--blast-primary);
        font-size: 0.78rem;
    }

    .blast-header-search-input {
        width: 100%;
        height: 34px;
        font-size: 0.8rem;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--blast-ink);
        outline: none;
    }

    .blast-header-search-input::placeholder {
        color: #7A8087;
    }

    .blast-ghost-btn,
    .blast-primary-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 10px;
        font-size: 0.78rem;
        font-weight: 600;
        white-space: nowrap;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .blast-ghost-btn {
        background: #ffffff;
        color: var(--blast-primary-deep);
        border: 1px solid rgba(30, 64, 175, 0.16);
    }

    .blast-primary-btn {
        color: #ffffff;
        background: linear-gradient(135deg, var(--blast-primary-deep), var(--blast-primary));
        box-shadow: none;
    }

    .blast-ghost-btn:hover,
    .blast-primary-btn:hover {
        transform: translateY(-1px);
    }

    .blast-mobile-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 10px;
        background: #ffffff;
        color: var(--blast-primary-deep);
        box-shadow: none;
        cursor: pointer;
    }

    .blast-mobile-panel {
        display: none;
        margin-top: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(196, 197, 213, 0.34);
        border-radius: 14px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    .blast-mobile-panel.is-open {
        display: block;
    }

    .blast-mobile-nav {
        display: grid;
        gap: 8px;
    }

    .blast-mobile-nav .blast-nav-link {
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--blast-surface-soft);
    }

    .blast-mobile-actions {
        display: grid;
        gap: 10px;
        margin-top: 14px;
    }

    @media (max-width: 1100px) {
        .blast-main-nav {
            display: none;
        }

        .blast-mobile-toggle {
            display: inline-flex;
        }
    }

    @media (max-width: 860px) {
        :root {
            --blast-header-height: 58px;
        }

        body {
            padding-top: calc(var(--blast-header-height) + 10px);
        }

        .blast-wrap {
            width: min(1120px, calc(100% - 20px));
        }

        .blast-header-shell {
            padding: 0 2px;
            gap: 8px;
        }

        .blast-brand-mark {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .blast-brand-tag,
        .blast-header-tools .blast-ghost-btn,
        .blast-header-tools .blast-primary-btn,
        .blast-header-search {
            display: none;
        }
    }
</style>
</th:block>
