<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="content">
<div class="other-trends-section py-12">
    <div class="max-w-4xl mx-auto px-4">
        <div class="explore-section flex items-center gap-3 mb-8 pl-2">
            <div class="home-icon w-10 h-10 rounded-full flex items-center justify-center" style="background-color: #FEF9C3; color: #FACC15;">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="text-gray-700">OTHER TRENDS</div>
        </div>

        <!-- Trends Grid -->
        <div class="category-grid grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- HESLB Section -->
            <a data-th-href="${baseUrl + '/trends/heslb-loan-application-guide'}" href="/trends/heslb-loan-application-guide"
               class="category-box border rounded-lg overflow-hidden block transition-shadow transition-colors duration-200 hover:shadow-sm hover:border-yellow-200"
               style="border-color: #FEF9C3;">
                <div class="category-header px-4 py-3 font-medium text-gray-800" style="background-color: #FEF9C3;">
                    HESLB
                </div>
                <div class="category-content p-4 flex items-center gap-3" style="border-bottom: 1px solid #FEF9C3;">
                    <div class="icon-circle w-8 h-8 rounded-full border flex items-center justify-center" style="color: #FACC15; border-color: #FACC15;">
                        <i class="fas fa-desktop"></i>
                    </div>
                    <div class="text-gray-700">HESLB Online Loan Application</div>
                </div>
                <div class="category-footer px-4 py-3 flex justify-center" style="background-color: #FEF9C3;">
                    <div class="view-more flex items-center gap-2 font-medium" style="color: #FACC15;">
                        <i class="fas fa-external-link-alt"></i>
                        View More
                    </div>
                </div>
            </a>
            
            <!-- TAMISEMI Section (First) -->
            <a data-th-href="${baseUrl + '/trends/tamisemi-selform-updates'}" href="/trends/tamisemi-selform-updates"
               class="category-box border rounded-lg overflow-hidden block transition-shadow transition-colors duration-200 hover:shadow-sm hover:border-yellow-200"
               style="border-color: #FEF9C3;">
                <div class="category-header px-4 py-3 font-medium text-gray-800" style="background-color: #FEF9C3;">
                    TAMISEMI
                </div>
                <div class="category-content p-4 flex items-center gap-3" style="border-bottom: 1px solid #FEF9C3;">
                    <div class="icon-circle w-8 h-8 rounded-full border flex items-center justify-center" style="color: #FACC15; border-color: #FACC15;">
                        <i class="fas fa-desktop"></i>
                    </div>
                    <div class="text-gray-700">Tamisemi Selfform Application</div>
                </div>
                <div class="category-footer px-4 py-3 flex justify-center" style="background-color: #FEF9C3;">
                    <div class="view-more flex items-center gap-2 font-medium" style="color: #FACC15;">
                        <i class="fas fa-external-link-alt"></i>
                        View More
                    </div>
                </div>
            </a>
            
            <!-- TAMISEMI Section (Second) -->
            <a data-th-href="${baseUrl + '/trends/form-five-selection-insights'}" href="/trends/form-five-selection-insights"
               class="category-box border rounded-lg overflow-hidden block transition-shadow transition-colors duration-200 hover:shadow-sm hover:border-yellow-200"
               style="border-color: #FEF9C3;">
                <div class="category-header px-4 py-3 font-medium text-gray-800" style="background-color: #FEF9C3;">
                    TAMISEMI
                </div>
                <div class="category-content p-4 flex items-center gap-3" style="border-bottom: 1px solid #FEF9C3;">
                    <div class="icon-circle w-8 h-8 rounded-full border flex items-center justify-center" style="color: #FACC15; border-color: #FACC15;">
                        <i class="fas fa-desktop"></i>
                    </div>
                    <div class="text-gray-700">Tamisemi Form Five Selection</div>
                </div>
                <div class="category-footer px-4 py-3 flex justify-center" style="background-color: #FEF9C3;">
                    <div class="view-more flex items-center gap-2 font-medium" style="color: #FACC15;">
                        <i class="fas fa-external-link-alt"></i>
                        View More
                    </div>
                </div>
            </a>
            
            <!-- ADMISSION Section -->
            <a data-th-href="${baseUrl + '/trends/university-admission-window'}" href="/trends/university-admission-window"
               class="category-box border rounded-lg overflow-hidden block transition-shadow transition-colors duration-200 hover:shadow-sm hover:border-yellow-200"
               style="border-color: #FEF9C3;">
                <div class="category-header px-4 py-3 font-medium text-gray-800" style="background-color: #FEF9C3;">
                    ADMISSION
                </div>
                <div class="category-content p-4 flex items-center gap-3" style="border-bottom: 1px solid #FEF9C3;">
                    <div class="icon-circle w-8 h-8 rounded-full border flex items-center justify-center" style="color: #FACC15; border-color: #FACC15;">
                        <i class="fas fa-desktop"></i>
                    </div>
                    <div class="text-gray-700">Tanzania All University Admission/Online Application</div>
                </div>
                <div class="category-footer px-4 py-3 flex justify-center" style="background-color: #FEF9C3;">
                    <div class="view-more flex items-center gap-2 font-medium" style="color: #FACC15;">
                        <i class="fas fa-external-link-alt"></i>
                        View More
                    </div>
                </div>
            </a>
        </div>
        <div class="mt-6 text-center">
            <a data-th-href="${baseUrl + '/trends'}" href="/trends"
               class="inline-flex items-center gap-2 text-sm font-medium transition-colors hover:underline"
               style="color: #FACC15;">
                View All Trends
                <i class="fas fa-external-link-alt text-xs"></i>
            </a>
        </div>
    </div>
</div>
</th:block>
