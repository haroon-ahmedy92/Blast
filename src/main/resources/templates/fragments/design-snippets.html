<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <!-- Internal developer reference only. Not linked in navigation. -->
    <section class="py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-semibold mb-2" style="color:#1E40AF;">Design Snippets</h2>
            <p class="text-sm text-gray-600">Reference components for consistent implementation.</p>
        </div>

        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <article class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                <h3 class="text-lg font-semibold mb-2" style="color:#1E40AF;">Default Card</h3>
                <p class="text-sm text-gray-600">Use for static info and simple feature blocks.</p>
            </article>
            <a href="#" class="block bg-white border border-gray-200 rounded-lg p-6 shadow-sm hover:border-gray-300 hover:shadow-md transition-colors transition-shadow">
                <h3 class="text-lg font-semibold mb-2" style="color:#1E40AF;">Clickable Card</h3>
                <p class="text-sm text-gray-600">For linked panels and list navigation.</p>
            </a>
            <div class="bg-white border border-gray-200 rounded-lg p-4 flex items-center justify-between">
                <div>
                    <h4 class="text-base font-semibold text-gray-900">List Item</h4>
                    <p class="text-sm text-gray-600">Meta</p>
                </div>
                <a href="#" class="text-sm font-medium hover:underline" style="color:#1E40AF;">View</a>
            </div>
        </div>

        <div class="flex flex-wrap gap-3 mb-8">
            <button class="px-5 py-2 rounded-lg text-white font-medium transition-colors transition-shadow hover:shadow-md" style="background-color:#1E40AF;">
                Primary
            </button>
            <button class="px-5 py-2 rounded-lg border border-gray-300 text-gray-700 font-medium bg-white transition-colors transition-shadow hover:bg-gray-50 hover:shadow-sm">
                Secondary
            </button>
            <a href="#" class="text-sm font-medium hover:underline self-center" style="color:#1E40AF;">Text Link</a>
        </div>

        <div class="flex flex-wrap gap-2 mb-8">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium" style="background-color:#EFF6FF;color:#1E40AF;">Featured</span>
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium" style="background-color:#DCFCE7;color:#166534;">Active</span>
        </div>

        <div class="grid md:grid-cols-2 gap-4 mb-8">
            <input type="text" placeholder="Input field" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <select class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <option>Select option</option>
            </select>
        </div>

        <nav class="flex flex-wrap gap-2" aria-label="Sub navigation snippet">
            <a href="#" class="px-3 py-2 rounded-full border border-gray-200 text-sm font-medium transition-colors transition-shadow hover:bg-gray-50 hover:border-gray-300 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2" style="color:#1E40AF;">
                Overview
            </a>
            <a href="#" class="px-3 py-2 rounded-full border text-sm font-medium" style="border-color:rgba(30,64,175,.25);background:rgba(30,64,175,.08);color:#1E40AF;">
                Active
            </a>
        </nav>
    </section>
</th:block>
