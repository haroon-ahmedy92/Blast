<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="content">
<header class="blast-site-header" id="blastSiteHeader">
    <div class="blast-wrap">
        <div class="blast-header-shell">
            <a data-th-href="${baseUrl}" href="/" class="blast-brand" aria-label="BLAST home">
                <span class="blast-brand-mark">
                    <img data-th-src="${baseUrl + '/companies/blast.png'}" src="/companies/blast.png" alt="Blast Logo">
                </span>
                <span class="blast-brand-copy">
                    <span class="blast-brand-name">BLAST</span>
                    <span class="blast-brand-tag">Career intelligence for Tanzania and beyond</span>
                </span>
            </a>

            <nav class="blast-main-nav" aria-label="Primary navigation">
                <a data-th-href="${baseUrl}" href="/" class="blast-nav-link" th:classappend="${currentPath == '/' ? ' is-active' : ''}">Home</a>
                <a data-th-href="${baseUrl + '/opportunities'}" href="/opportunities" class="blast-nav-link" th:classappend="${currentPath == '/opportunities' ? ' is-active' : ''}">Jobs</a>
                <a data-th-href="${baseUrl + '/tanzania-jobs'}" href="/tanzania-jobs" class="blast-nav-link" th:classappend="${currentPath == '/tanzania-jobs' ? ' is-active' : ''}">Tanzania</a>
                <a data-th-href="${baseUrl + '/tenders'}" href="/tenders" class="blast-nav-link" th:classappend="${currentPath == '/tenders' ? ' is-active' : ''}">Tenders</a>
                <a data-th-href="${baseUrl + '/post'}" href="/post" class="blast-nav-link" th:classappend="${currentPath == '/post' ? ' is-active' : ''}">Employers</a>
                <a data-th-href="${baseUrl + '/other'}" href="/other" class="blast-nav-link" th:classappend="${currentPath == '/other' ? ' is-active' : ''}">Tools</a>
                <a data-th-href="${baseUrl + '/about'}" href="/about" class="blast-nav-link" th:classappend="${currentPath == '/about' ? ' is-active' : ''}">About</a>
            </nav>

            <div class="blast-header-tools">
                <a data-th-href="${baseUrl + '/get-started'}" href="/get-started" class="blast-ghost-btn">Start</a>
                <a data-th-href="${baseUrl + '/job-form'}" href="/job-form" class="blast-primary-btn">Post</a>
                <button class="blast-mobile-toggle" type="button" id="blastMobileToggle" aria-expanded="false" aria-controls="blastMobilePanel" aria-label="Open menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <div class="blast-mobile-panel" id="blastMobilePanel">
            <form class="blast-header-search js-blast-search-form" role="search" style="display:flex; width:100%; margin-bottom:10px;">
                <i class="fas fa-search" aria-hidden="true"></i>
                <input type="search" class="blast-header-search-input js-blast-search-input" placeholder="Search jobs, tenders, or companies" aria-label="Search BLAST mobile">
            </form>
            <nav class="blast-mobile-nav" aria-label="Mobile navigation">
                <a data-th-href="${baseUrl}" href="/" class="blast-nav-link" th:classappend="${currentPath == '/' ? ' is-active' : ''}">Home</a>
                <a data-th-href="${baseUrl + '/opportunities'}" href="/opportunities" class="blast-nav-link" th:classappend="${currentPath == '/opportunities' ? ' is-active' : ''}">Jobs</a>
                <a data-th-href="${baseUrl + '/tanzania-jobs'}" href="/tanzania-jobs" class="blast-nav-link" th:classappend="${currentPath == '/tanzania-jobs' ? ' is-active' : ''}">Tanzania</a>
                <a data-th-href="${baseUrl + '/tenders'}" href="/tenders" class="blast-nav-link" th:classappend="${currentPath == '/tenders' ? ' is-active' : ''}">Tenders</a>
                <a data-th-href="${baseUrl + '/post'}" href="/post" class="blast-nav-link" th:classappend="${currentPath == '/post' ? ' is-active' : ''}">Employers</a>
                <a data-th-href="${baseUrl + '/other'}" href="/other" class="blast-nav-link" th:classappend="${currentPath == '/other' ? ' is-active' : ''}">Tools</a>
                <a data-th-href="${baseUrl + '/about'}" href="/about" class="blast-nav-link" th:classappend="${currentPath == '/about' ? ' is-active' : ''}">About</a>
            </nav>
            <div class="blast-mobile-actions">
                <a data-th-href="${baseUrl + '/get-started'}" href="/get-started" class="blast-ghost-btn">Start</a>
                <a data-th-href="${baseUrl + '/job-form'}" href="/job-form" class="blast-primary-btn">Post</a>
            </div>
        </div>
    </div>
</header>

<script>
    (function () {
        const mobileToggle = document.getElementById('blastMobileToggle');
        const mobilePanel = document.getElementById('blastMobilePanel');

        if (mobileToggle && mobilePanel) {
            mobileToggle.addEventListener('click', function () {
                const isOpen = mobilePanel.classList.toggle('is-open');
                mobileToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });
        }

        document.querySelectorAll('.js-blast-search-form').forEach(function (form) {
            form.addEventListener('submit', function (event) {
                event.preventDefault();
                window.location.href = '/opportunities';
            });
        });

        document.querySelectorAll('.js-blast-search-input').forEach(function (input) {
            input.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    window.location.href = '/opportunities';
                }
            });
        });
    }());
</script>
</th:block>
